<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2d1b10" />
      <stop offset="100%" stop-color="#1a1a1a" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="20" fill="url(#bg)" stroke="url(#glow)" stroke-width="4" />
  <text x="50" y="70" font-family="sans-serif" font-size="60" font-weight="900" fill="url(#glow)" text-anchor="middle">L</text>
  <circle cx="50" cy="50" r="40" fill="none" stroke="url(#glow)" stroke-width="2" stroke-dasharray="10 5" opacity="0.5">
    <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="10s" repeatCount="indefinite" />
  </circle>
</svg>